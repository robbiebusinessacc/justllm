name: Bug report
description: Something doesn't work the way it should.
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What you expected vs. what actually happened.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: The smallest snippet that triggers it.
      render: python
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: justllm version
      placeholder: "0.1.0  (python -c 'import justllm; print(justllm.__version__)')"
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Python version & provider
      placeholder: "Python 3.12, openai/gpt-4o via [litellm]"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Traceback / logs
      render: shell
